trigger:
- main

pr:
- main
- walk-ex*

strategy:
  matrix:
    Windows:
      vmImage: windows-latest
    Ubuntu:
      vmImage: ubuntu-latest

pool:
  vmImage: $(vmImage)

steps:
- task: UseNode@1
  displayName: Use Node.js 20.x (for Mermaid validation)
  inputs:
    version: '20.x'

- script: |
    GITLEAKS_VERSION=8.30.1
    curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
      -o /tmp/gitleaks.tar.gz
    tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
    sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
    gitleaks version
  displayName: Install gitleaks (Ubuntu)
  condition: eq(variables['Agent.OS'], 'Linux')

- pwsh: |
    winget install --id gitleaks.gitleaks --version 8.30.1 --silent --accept-source-agreements --accept-package-agreements
    # Refresh PATH in this session
    $env:PATH = [System.Environment]::GetEnvironmentVariable('PATH','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('PATH','User')
    # Run scan in same session where PATH is updated
    gitleaks detect --source . --config .gitleaks.toml --no-banner --exit-code 1
  displayName: Install gitleaks and scan (Windows)
  condition: eq(variables['Agent.OS'], 'Windows_NT')

- script: gitleaks detect --source . --config .gitleaks.toml --no-banner --exit-code 1
  displayName: Scan for secrets (Ubuntu)
  condition: eq(variables['Agent.OS'], 'Linux')

- task: PowerShell@2
  displayName: Resolve dependencies and init
  inputs:
    targetType: 'filePath'
    filePath: ./Build/build.ps1
    arguments: '-ResolveDependency -TaskList Init'
    errorActionPreference: 'stop'
    failOnStderr: false
    pwsh: true

- task: PowerShell@2
  displayName: Stage module
  inputs:
    targetType: 'filePath'
    filePath: ./Build/build.ps1
    arguments: '-TaskList Stage'
    errorActionPreference: 'stop'
    failOnStderr: false
    pwsh: true

- task: PowerShell@2
  displayName: Analyze
  inputs:
    targetType: 'filePath'
    filePath: ./Build/build.ps1
    arguments: '-TaskList Analyze'
    errorActionPreference: 'stop'
    failOnStderr: false
    pwsh: true

- task: PowerShell@2
  displayName: Test
  inputs:
    targetType: 'filePath'
    filePath: ./Build/build.ps1
    arguments: '-TaskList Test'
    errorActionPreference: 'stop'
    failOnStderr: false
    pwsh: true

- task: PowerShell@2
  displayName: Coverage summary (advisory)
  continueOnError: true
  inputs:
    targetType: 'filePath'
    filePath: ./scripts/Write-CoverageSummary.ps1
    errorActionPreference: 'continue'
    failOnStderr: false
    pwsh: true

- task: PowerShell@2
  displayName: Strict-PSSA scripts/ (blocking)
  continueOnError: false
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $findings = Invoke-ScriptAnalyzer `
          -Path scripts/ `
          -Settings Build/PSScriptAnalyzerSettings.Strict.psd1 `
          -Severity Warning,Error,Information
      if ($findings.Count -gt 0) {
          $findings | ForEach-Object {
              Write-Host "##[error][$($_.Severity)] $($_.RuleName) at $($_.ScriptName):$($_.Line) — $($_.Message)"
          }
          throw "$($findings.Count) strict-PSSA finding(s) in scripts/. Fix or add an inline suppression with Justification."
      }
      Write-Host "Strict-PSSA: scripts/ is clean."
